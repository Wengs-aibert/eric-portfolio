<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 40px; font-family: system-ui; }
  .label { color: #999; font-size: 14px; text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: -20px; }
  
  .card {
    width: 700px;
    height: 400px;
    border-radius: 12px;
    position: relative;
    overflow: hidden;
  }

  /* FRONT */
  .front {
    background: #000;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 40px;
  }

  .front .top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .front .name {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 36px;
    color: transparent;
    -webkit-text-stroke: 1.5px rgba(255,255,255,0.3);
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .front .accent-square {
    width: 40px;
    height: 40px;
    background: #F97316;
    border-radius: 2px;
  }

  .front .line {
    width: 100%;
    height: 2px;
    background: #F97316;
  }

  .front .bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .front .title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 11px;
    color: #F97316;
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }

  .front .website {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.1em;
  }

  /* BACK */
  .back {
    background: #000;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 40px;
  }

  .back .top-section {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .back .info-block {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .back .info-item {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .back .info-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    color: #F97316;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    width: 60px;
  }

  .back .info-value {
    font-size: 14px;
    color: rgba(255,255,255,0.8);
    letter-spacing: 0.05em;
  }

  .back .qr-placeholder {
    width: 100px;
    height: 100px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.25);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .back .bottom-strip {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .back .skills-strip {
    font-family: 'Orbitron', sans-serif;
    font-size: 8px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .back .accent-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: #F97316;
  }

  .back .name-small {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 14px;
    color: rgba(255,255,255,0.15);
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>

<p class="label">Front</p>
<div class="card front">
  <div class="top">
    <div class="name">ERIC<br>WENG</div>
    <div class="accent-square"></div>
  </div>
  <div class="line"></div>
  <div class="bottom">
    <div class="title">Full Stack Software Engineer</div>
    <div class="website">ericweng.dev</div>
  </div>
</div>

<p class="label">Back</p>
<div class="card back">
  <div class="top-section">
    <div class="info-block">
      <div class="info-item">
        <span class="info-label">Email</span>
        <span class="info-value">erictweng@gmail.com</span>
      </div>
      <div class="info-item">
        <span class="info-label">Phone</span>
        <span class="info-value">(925) 487-3118</span>
      </div>
      <div class="info-item">
        <span class="info-label">GitHub</span>
        <span class="info-value">github.com/erictweng</span>
      </div>
      <div class="info-item">
        <span class="info-label">Web</span>
        <span class="info-value">ericweng.dev</span>
      </div>
    </div>
    <div class="qr-placeholder">QR Code</div>
  </div>
  <div class="bottom-strip">
    <div class="skills-strip">React ★ TypeScript ★ Python ★ Java ★ Rust ★ Full Stack</div>
    <div class="name-small">ERIC WENG</div>
  </div>
  <div class="accent-bar"></div>
</div>

</body>
</html>
